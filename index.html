    <!-- Schema.org JSON-LD -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Person",
      "name": "Chris Hackett",
      "url": "https://chrish.me/",
      "jobTitle": "Full-Stack Software Engineer",
      "email": "crishack8@gmail.com",

        "Cloudflare Workers", "Docker"
      ],
      "hasOccupation": [
        {
          "@type": "Occupation",
          "name": "Full-Stack Developer",
          "occupationLocation": { "@type": "Organization", "name": "IMT Insurance" },
          "startDate": "2020"
        }
      ]
    }
    </script>
    <style>
      html.no-plain #static-content { display: none; }
      html:not(.no-plain) #app { display: none; }
      html:not(.plain) #static-content .back-link { display: none; }
    </style>
    <script>
      (function () {
        var isPlain = new URLSearchParams(location.search).get('plain') !== null
        if (isPlain) {
          document.documentElement.classList.add('plain')
          return
        }
        document.documentElement.classList.add('no-plain')
        var stored = localStorage.getItem('theme')
        var dark = stored ? stored === 'dark' : window.matchMedia('(prefers-color-scheme: dark)').matches
        if (dark) document.documentElement.classList.add('dark')
      })()
    </script>
  </head>
  <body>
    <!-- Static HTML content — always in the DOM for crawlers, shown in plain
         mode (?plain) and when JavaScript is disabled. -->
    <div id="static-content"><!-- STATIC_CONTENT --></div>

    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
